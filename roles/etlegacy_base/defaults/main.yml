---
etlegacy_user: etlegacy
etlegacy_group: etlegacy

etlegacy_install_dir: /opt/etlegacy

# ET:Legacy v2.83.2 — update file ID at https://www.etlegacy.com/download when upgrading
etlegacy_version: "2.83.2"
etlegacy_download_url: "https://www.etlegacy.com/download/file/700"

wolfet_installer_url: "https://cdn.splashdamage.com/downloads/games/wet/et260b.x86_full.zip"
wolfet_tmp_dir: "/tmp/wolfet_extract"

etlegacy_dirs:
  - etmain
  - home
  - home/legacy
  - legacy

# Server identity
etlegacy_hostname: "^3Wolf's Lair"
etlegacy_motd: "Po Práci na Frontu!"
etlegacy_maxclients: 10

# Auth
etlegacy_password: "5.května"
etlegacy_rcon_password: "115426"

# Fast download — HTTP only (ET engine does not support HTTPS)
etlegacy_www_baseurl: "http://wolf.jflab.cz"
etlegacy_www_fallbackurl: "http://wolf.jflab.cz"
etlegacy_dl_disconnected: "1"
etlegacy_dl_maxrate: "42000"

# Private server — hidden from public master server browser
etlegacy_advert: "0"
etlegacy_flood_protect: "1"

etlegacy_map: battery
etlegacy_gametype: 6

etlegacy_port: 27960

etlegacy_min_map_age: "1"
etlegacy_voice_chats_allowed: "15"
etlegacy_bluelimbotime: "15000"
etlegacy_intermission_time: "30"

# Nginx / TLS (used by etlegacy_nginx role if present)
etlegacy_server_name: "wolf.jflab.cz"
nginx_ssl_certificate: "/etc/ssl/wolf/wolf.fullchain.pem"
nginx_ssl_certificate_key: "/etc/ssl/wolf/wolf.key"
