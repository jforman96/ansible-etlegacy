---
- name: Stop and disable old live-chat service if present
  ansible.builtin.systemd:
    name: live-chat
    state: stopped
    enabled: no
  failed_when: false

- name: Create wolf-portal directory
  ansible.builtin.file:
    path: "{{ live_chat_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy chat.py backend
  ansible.builtin.template:
    src: chat.py.j2
    dest: "{{ live_chat_dir }}/chat.py"
    owner: root
    group: root
    mode: "0755"
  notify: restart wolf-portal

- name: Deploy favicon
  ansible.builtin.copy:
    src: favicon.ico
    dest: "{{ live_chat_dir }}/favicon.ico"
    owner: root
    group: root
    mode: "0644"

- name: Deploy index.html frontend
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ live_chat_dir }}/index.html"
    owner: root
    group: root
    mode: "0644"

- name: Deploy etl-show-chat CLI tool
  ansible.builtin.template:
    src: etl-show-chat.j2
    dest: "{{ live_chat_dir }}/etl-show-chat"
    owner: root
    group: root
    mode: "0755"

- name: Deploy wolf-portal systemd service
  ansible.builtin.template:
    src: wolf-portal.service.j2
    dest: /etc/systemd/system/wolf-portal.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd daemon
    - restart wolf-portal

- name: Enable and start wolf-portal service
  ansible.builtin.systemd:
    name: wolf-portal
    enabled: yes
    state: started
